<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  #pbot-bubble {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
    width: 56px; height: 56px; border-radius: 50%;
    background: #000; border: 2px solid #00ff41;
    box-shadow: 0 0 18px rgba(0,255,65,0.45);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: box-shadow 0.3s, transform 0.2s;
    animation: botPulse 2.5s ease-in-out infinite;
  }
  #pbot-bubble:hover { box-shadow: 0 0 32px rgba(0,255,65,0.7); transform: scale(1.08); }
  @keyframes botPulse { 0%,100%{box-shadow:0 0 18px rgba(0,255,65,0.45)} 50%{box-shadow:0 0 30px rgba(0,255,65,0.75)} }
  #pbot-bubble svg { width: 26px; height: 26px; stroke: #00ff41; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  #pbot-notif {
    position: absolute; top: -4px; right: -4px;
    width: 14px; height: 14px; background: #00ff41; border-radius: 50%;
    border: 2px solid #000; animation: blink 1.2s infinite; display: none;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  #pbot-window {
    position: fixed; bottom: 6rem; right: 2rem; z-index: 9999;
    width: 360px; max-height: 520px;
    background: #060a06; border: 1px solid rgba(0,255,65,0.3);
    box-shadow: 0 0 40px rgba(0,255,65,0.15);
    display: none; flex-direction: column; overflow: hidden;
    font-family: 'Space Mono', monospace;
    animation: botSlideIn 0.3s ease;
  }
  @keyframes botSlideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  #pbot-header {
    padding: 1rem 1.2rem; border-bottom: 1px solid rgba(0,255,65,0.2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,255,65,0.04);
  }
  #pbot-header-left { display: flex; align-items: center; gap: 0.7rem; }
  #pbot-status-dot { width: 8px; height: 8px; background: #00ff41; border-radius: 50%; animation: blink 1.5s infinite; flex-shrink: 0; box-shadow: 0 0 6px #00ff41; }
  #pbot-title { font-size: 0.72rem; letter-spacing: 3px; color: #00ff41; text-transform: uppercase; }
  #pbot-subtitle { font-size: 0.58rem; color: rgba(200,255,212,0.45); letter-spacing: 1px; margin-top: 0.1rem; }
  #pbot-close { background: none; border: none; color: rgba(200,255,212,0.4); cursor: pointer; font-size: 1.1rem; padding: 0; transition: color 0.2s; }
  #pbot-close:hover { color: #00ff41; }

  #pbot-messages {
    flex: 1; overflow-y: auto; padding: 1rem 1.2rem;
    display: flex; flex-direction: column; gap: 0.8rem;
    scrollbar-width: thin; scrollbar-color: rgba(0,255,65,0.3) transparent;
  }
  #pbot-messages::-webkit-scrollbar { width: 4px; }
  #pbot-messages::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.3); border-radius: 2px; }

  .pbot-msg { max-width: 85%; font-size: 0.75rem; line-height: 1.7; animation: msgFade 0.3s ease; }
  @keyframes msgFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .pbot-msg.bot { align-self: flex-start; }
  .pbot-msg.bot .pbot-bubble-inner { background: rgba(0,255,65,0.06); border: 1px solid rgba(0,255,65,0.18); color: #c8ffd4; padding: 0.7rem 0.9rem; }
  .pbot-msg.bot .pbot-sender { font-size: 0.55rem; letter-spacing: 2px; color: #00ff41; text-transform: uppercase; margin-bottom: 0.3rem; }
  .pbot-msg.user { align-self: flex-end; }
  .pbot-msg.user .pbot-bubble-inner { background: rgba(0,255,65,0.12); border: 1px solid rgba(0,255,65,0.3); color: #c8ffd4; padding: 0.7rem 0.9rem; text-align: right; }

  .pbot-typing { align-self: flex-start; }
  .pbot-typing .pbot-bubble-inner { background: rgba(0,255,65,0.06); border: 1px solid rgba(0,255,65,0.18); padding: 0.7rem 0.9rem; display: flex; gap: 4px; align-items: center; }
  .pbot-dot { width: 6px; height: 6px; background: #00ff41; border-radius: 50%; animation: dotBounce 1.2s infinite; }
  .pbot-dot:nth-child(2) { animation-delay: 0.2s; }
  .pbot-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  .pbot-quick-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
  .pbot-quick-btn {
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    letter-spacing: 1px; color: #00ff41; border: 1px solid rgba(0,255,65,0.3);
    background: transparent; padding: 0.3rem 0.65rem; cursor: pointer;
    transition: background 0.2s, border-color 0.2s; text-transform: uppercase;
  }
  .pbot-quick-btn:hover { background: rgba(0,255,65,0.1); border-color: #00ff41; }

  #pbot-input-area {
    padding: 0.8rem 1.2rem; border-top: 1px solid rgba(0,255,65,0.2);
    display: flex; gap: 0.6rem; align-items: flex-end;
    background: rgba(0,255,65,0.02);
  }
  #pbot-input {
    flex: 1; background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2);
    color: #c8ffd4; font-family: 'Space Mono', monospace; font-size: 0.72rem;
    padding: 0.6rem 0.8rem; outline: none; resize: none; line-height: 1.5;
    transition: border-color 0.2s; max-height: 80px;
  }
  #pbot-input::placeholder { color: rgba(200,255,212,0.3); }
  #pbot-input:focus { border-color: rgba(0,255,65,0.5); }
  #pbot-send {
    background: #00ff41; border: none; color: #000; padding: 0.6rem 0.9rem;
    cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.65rem;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    transition: background 0.2s; flex-shrink: 0;
  }
  #pbot-send:hover { background: #39ff14; }
  #pbot-send:disabled { opacity: 0.4; cursor: not-allowed; }

  @media(max-width: 480px) {
    #pbot-window { width: calc(100vw - 2rem); right: 1rem; bottom: 5.5rem; }
    #pbot-bubble { bottom: 1.2rem; right: 1.2rem; }
  }
</style>

<!-- Bubble button -->
<div id="pbot-bubble" onclick="pbotToggle()">
  <div id="pbot-notif"></div>
  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</div>

<!-- Chat window -->
<div id="pbot-window">
  <div id="pbot-header">
    <div id="pbot-header-left">
      <div id="pbot-status-dot"></div>
      <div>
        <div id="pbot-title">JAI — Portfolio Bot</div>
        <div id="pbot-subtitle">Powered by Hugging Face · Mistral 7B</div>
      </div>
    </div>
    <button id="pbot-close" onclick="pbotToggle()">✕</button>
  </div>
  <div id="pbot-messages"></div>
  <div id="pbot-input-area">
    <textarea id="pbot-input" rows="1" placeholder="Type a message..."></textarea>
    <button id="pbot-send" onclick="pbotSend()">Send</button>
  </div>
</div>

<script>
// ============================================================

const HF_TOKEN = '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';
const EMAILJS_PUBLIC_KEY = 'GDJqVgFTXf65V1vPN';
const EMAILJS_SERVICE_ID = 'service_jbhrgfa';
const EMAILJS_TEMPLATE_ID = 'template_rz8bzia';
// ============================================================

emailjs.init(EMAILJS_PUBLIC_KEY);

const SYSTEM_PROMPT = `You are JAI, a friendly and witty portfolio assistant for Jaswanth Mudapaka — a CS grad from Hyderabad, India who builds AI pipelines, test automation frameworks, and cloud systems.

Your personality: warm, curious, slightly playful — never robotic. Speak like a smart friend, not a chatbot. Keep all replies to 2-4 sentences max.

YOUR GOALS:
1. Greet visitors warmly and make them feel welcome
2. Ask genuine human questions — what brought them here, what they thought, any advice for Jaswanth
3. Share project info when asked (snippets only)
4. Collect feedback naturally and thank them
5. If someone gives feedback, acknowledge warmly and offer to send it to Jaswanth

JASWANTH'S PROJECTS (give brief exciting snippets):
1. JobMatch AI — ReAct agent with LangGraph + Groq LLaMA 3.3. Scores resumes vs job descriptions in 15 seconds. Tavily web search + SQLite.
2. IntakeIQ — AI document intake for law firms. Classifies 9+ legal doc types zero-shot. Auto-extracts fields and routes documents.
3. Playwright OpenCart Framework — 60+ test cases, POM, GitHub Actions CI/CD. Caught 3 browser-specific bugs.
4. Call Center Summarization AI — AWS pipeline. Jumped 78% to 95% accuracy. 40% reduction in manual review.
5. Face Mask Detection — YOLOv5, 682 training images, real-time CV.
6. Crop Recommendation System — Random Forest, 5000+ records, 92% accuracy, Flask API.

INTERNSHIP: Gen AI Developer Intern at Magic Bus India Foundation (2024) — HR chatbot with Amazon Bedrock + LangChain + Streamlit.

IMPORTANT: Always respond in 2-4 sentences only. Never write long paragraphs.`;

let pbotOpen = false;
let pbotHistory = [];
let pbotStarted = false;
let pbotVisitorName = '';
let pbotFeedbackBuffer = [];
let pbotEmailSent = false;

const openingMessages = [
  "Hey there! I'm JAI — Jaswanth's portfolio bot. What brought you here today?",
  "Welcome! I'm JAI. Quick question — what caught your eye first on this portfolio?",
  "Hey! JAI here. Honestly curious — first impressions of the portfolio?"
];

function pbotToggle() {
  pbotOpen = !pbotOpen;
  const win = document.getElementById('pbot-window');
  document.getElementById('pbot-notif').style.display = 'none';
  win.style.display = pbotOpen ? 'flex' : 'none';
  if (pbotOpen && !pbotStarted) {
    pbotStarted = true;
    setTimeout(() => {
      const opener = openingMessages[Math.floor(Math.random() * openingMessages.length)];
      pbotAddMessage('bot', opener, ['Tell me about your projects', 'What roles are you open to?', 'Leave feedback']);
    }, 400);
  }
}

function pbotAddMessage(role, text, quickBtns = []) {
  const msgs = document.getElementById('pbot-messages');
  const wrap = document.createElement('div');
  wrap.className = `pbot-msg ${role}`;
  if (role === 'bot') {
    const sender = document.createElement('div');
    sender.className = 'pbot-sender';
    sender.textContent = 'JAI';
    wrap.appendChild(sender);
  }
  const inner = document.createElement('div');
  inner.className = 'pbot-bubble-inner';
  inner.textContent = text;
  wrap.appendChild(inner);
  if (quickBtns.length > 0) {
    const btnRow = document.createElement('div');
    btnRow.className = 'pbot-quick-btns';
    quickBtns.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'pbot-quick-btn';
      btn.textContent = label;
      btn.onclick = () => { btnRow.remove(); pbotSendText(label); };
      btnRow.appendChild(btn);
    });
    wrap.appendChild(btnRow);
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function pbotShowTyping() {
  const msgs = document.getElementById('pbot-messages');
  const wrap = document.createElement('div');
  wrap.className = 'pbot-msg pbot-typing';
  wrap.id = 'pbot-typing-indicator';
  wrap.innerHTML = '<div class="pbot-bubble-inner"><div class="pbot-dot"></div><div class="pbot-dot"></div><div class="pbot-dot"></div></div>';
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function pbotHideTyping() {
  const t = document.getElementById('pbot-typing-indicator');
  if (t) t.remove();
}

async function pbotSendText(text) {
  if (!text.trim()) return;
  pbotAddMessage('user', text);
  if (text.length > 20) pbotFeedbackBuffer.push(text);
  pbotHistory.push({ role: 'user', content: text });
  pbotShowTyping();
  document.getElementById('pbot-send').disabled = true;

  // Build prompt in Mistral instruct format
  let prompt = `<s>[INST] ${SYSTEM_PROMPT} [/INST]</s>\n`;
  pbotHistory.forEach((msg, i) => {
    if (msg.role === 'user') prompt += `[INST] ${msg.content} [/INST]`;
    else prompt += ` ${msg.content}</s>\n`;
  });

  try {
    const res = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${HF_TOKEN}`
      },
      body: JSON.stringify({
        inputs: prompt,
        parameters: {
          max_new_tokens: 120,
          temperature: 0.75,
          return_full_text: false,
          stop: ['[INST]', '</s>']
        }
      })
    });

    const data = await res.json();
    let reply = '';

    if (Array.isArray(data) && data[0]?.generated_text) {
      reply = data[0].generated_text.trim();
    } else if (data.error) {
      reply = data.error.includes('loading') 
        ? "Model is warming up — try again in 20 seconds!" 
        : "Hmm, something went wrong. Try again?";
    } else {
      reply = "Didn't catch that — try again?";
    }

    pbotHistory.push({ role: 'assistant', content: reply });
    pbotHideTyping();

    const namePat = text.match(/(?:i'm|i am|my name is|call me)\s+([A-Z][a-z]+)/i);
    if (namePat && !pbotVisitorName) pbotVisitorName = namePat[1];

    const feedbackKeywords = ['feedback', 'advice', 'suggest', 'improve', 'think', 'looks', 'great', 'love', 'nice', 'awesome', 'could be', 'should', 'maybe'];
    const hasFeedback = feedbackKeywords.some(k => text.toLowerCase().includes(k));

    let quickBtns = [];
    if (hasFeedback && !pbotEmailSent) {
      quickBtns = ['Yes, send my feedback to Jaswanth', 'No thanks'];
    } else if (reply.toLowerCase().includes('project')) {
      quickBtns = ['JobMatch AI', 'IntakeIQ', 'Playwright Framework'];
    }

    pbotAddMessage('bot', reply, quickBtns);

    if (text.toLowerCase().includes('yes, send my feedback')) {
      pbotSendEmailFeedback();
    }

  } catch (err) {
    pbotHideTyping();
    pbotAddMessage('bot', "Connection dropped — check your internet and try again.");
  }

  document.getElementById('pbot-send').disabled = false;
}

function pbotSend() {
  const input = document.getElementById('pbot-input');
  const text = input.value.trim();
  input.value = '';
  input.style.height = 'auto';
  if (text) pbotSendText(text);
}

async function pbotSendEmailFeedback() {
  if (pbotEmailSent) return;
  pbotEmailSent = true;
  const feedback = pbotFeedbackBuffer.join('\n\n') || 'Visitor interacted but no long-form feedback captured.';
  const name = pbotVisitorName || 'Anonymous Visitor';
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      visitor_name: name,
      feedback: feedback,
      timestamp: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })
    });
    pbotAddMessage('bot', `Done! Your feedback is in Jaswanth's inbox. He'll read it — promise. Thanks ${name} 🙏`);
  } catch (e) {
    pbotAddMessage('bot', "Email didn't go through, but your words are appreciated either way!");
  }
}

document.getElementById('pbot-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); pbotSend(); }
});
document.getElementById('pbot-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// Auto popup after 8 seconds
setTimeout(() => {
  if (!pbotStarted) {
    document.getElementById('pbot-notif').style.display = 'block';
  }
}, 8000);
</script>
